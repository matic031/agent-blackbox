name: guardian
version: "1.0.0"
kind: standalone
description: "Umanitek Agent Guardian — graph-driven agent security. Syncs a threat ruleset from the local OriginTrail DKG node (curated public threats + local graph) and matches every tool call and model request against it: prompt-injection patterns, privilege-escalation tool shapes, and vulnerable dependency installs. Audit mode by default (records findings, shares anonymized sightings to SWM); block mode refuses tool calls at/above a configured severity. Fail-open everywhere."
author: Umanitek
hooks:
  - pre_tool_call
  - post_tool_call
  - pre_api_request
  - on_session_start
  - on_session_end

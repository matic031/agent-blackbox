name: Secret scan

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select commits to scan
        id: range
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            range="$BASE_SHA..$HEAD_SHA"
          elif [[ -n "$BEFORE_SHA" && ! "$BEFORE_SHA" =~ ^0+$ ]]; then
            range="$BEFORE_SHA..$HEAD_SHA"
          elif git rev-parse "$HEAD_SHA^" >/dev/null 2>&1; then
            range="$HEAD_SHA^..$HEAD_SHA"
          else
            range="$HEAD_SHA"
          fi
          echo "range=$range" >> "$GITHUB_OUTPUT"

      - name: Scan new commits for secrets
        env:
          SCAN_RANGE: ${{ steps.range.outputs.range }}
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git /repo --log-opts="$SCAN_RANGE" --redact=100 --no-banner
